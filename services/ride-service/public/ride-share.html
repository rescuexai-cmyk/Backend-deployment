<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>Raahi Live Trip</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --cream: #FBF2E8;
      --ink: #231409;
      --muted: #606060;
      --accent: #D4956A;
      --card: #ffffff;
      --border: #E8DFD3;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--cream);
      color: var(--ink);
    }
    #map { width: 100%; height: 58vh; }
    .panel {
      position: relative;
      margin-top: -18px;
      background: var(--card);
      border-radius: 20px 20px 0 0;
      padding: 18px 18px 28px;
      box-shadow: 0 -8px 24px rgba(0,0,0,0.08);
      min-height: 42vh;
    }
    .brand {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .brand h1 {
      margin: 0;
      font-size: 20px;
      color: var(--accent);
    }
    .status {
      font-size: 12px;
      font-weight: 700;
      padding: 6px 10px;
      border-radius: 999px;
      background: #FFF3E0;
      color: #E65100;
      text-transform: uppercase;
    }
    .status.live { background: #E8F5E9; color: #2E7D32; }
    .status.done { background: #ECEFF1; color: #546E7A; }
    .row { margin: 10px 0; }
    .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .value { font-size: 15px; font-weight: 600; margin-top: 2px; word-break: break-word; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 8px;
    }
    .error {
      padding: 40px 20px;
      text-align: center;
      color: #B71C1C;
    }
    .hint { font-size: 12px; color: var(--muted); margin-top: 14px; }
    .vehicle-marker {
      background: #111;
      color: #fff;
      border-radius: 50%;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="map"></div>
    <div class="panel" id="panel">
      <div class="brand">
        <h1>Raahi</h1>
        <div class="status" id="statusPill">Loading…</div>
      </div>
      <div id="content">Fetching live trip…</div>
      <div class="hint">Live location refreshes every few seconds. Link expires in 24 hours.</div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    (function () {
      const token = location.pathname.split('/').filter(Boolean).pop();
      const apiUrl = '/api/rides/share/' + encodeURIComponent(token);

      const statusPill = document.getElementById('statusPill');
      const content = document.getElementById('content');

      let map, vehicleMarker, pickupMarker, dropMarker;
      let fittedOnce = false;

      function esc(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function statusClass(status) {
        const s = String(status || '').toUpperCase();
        if (s.includes('PROGRESS') || s.includes('ARRIVED') || s.includes('ASSIGNED') || s.includes('CONFIRMED')) return 'live';
        if (s.includes('COMPLETED') || s.includes('CANCEL')) return 'done';
        return '';
      }

      function prettyStatus(status) {
        return String(status || 'UNKNOWN').replace(/_/g, ' ');
      }

      function ensureMap(center) {
        if (map) return;
        map = L.map('map', { zoomControl: false }).setView(center, 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          maxZoom: 19,
          attribution: '&copy; OpenStreetMap'
        }).addTo(map);
        L.control.zoom({ position: 'topright' }).addTo(map);
      }

      function vehicleIcon() {
        return L.divIcon({
          className: '',
          html: '<div class="vehicle-marker">🚕</div>',
          iconSize: [34, 34],
          iconAnchor: [17, 17],
        });
      }

      function render(data) {
        statusPill.textContent = prettyStatus(data.status);
        statusPill.className = 'status ' + statusClass(data.status);

        const passenger = (data.passenger && data.passenger.name) || 'Passenger';
        const driver = data.driver || {};
        content.innerHTML =
          '<div class="row"><div class="label">Passenger</div><div class="value">' + esc(passenger) + '</div></div>' +
          '<div class="row"><div class="label">Pickup</div><div class="value">' + esc(data.pickupAddress || '-') + '</div></div>' +
          '<div class="row"><div class="label">Drop</div><div class="value">' + esc(data.dropAddress || '-') + '</div></div>' +
          '<div class="grid">' +
            '<div class="row"><div class="label">Driver</div><div class="value">' + esc(driver.name || '-') + '</div></div>' +
            '<div class="row"><div class="label">Vehicle</div><div class="value">' + esc(driver.vehicleNumber || driver.vehicleModel || '-') + '</div></div>' +
          '</div>';

        const pickup = data.pickup;
        const drop = data.drop;
        const vehicle = data.vehicleLocation;
        const center = vehicle
          ? [vehicle.lat, vehicle.lng]
          : (pickup ? [pickup.lat, pickup.lng] : [28.6139, 77.2090]);

        ensureMap(center);

        if (pickup && pickup.lat != null && pickup.lng != null) {
          if (!pickupMarker) {
            pickupMarker = L.marker([pickup.lat, pickup.lng], {
              title: 'Pickup'
            }).addTo(map).bindPopup('Pickup');
          } else {
            pickupMarker.setLatLng([pickup.lat, pickup.lng]);
          }
        }

        if (drop && drop.lat != null && drop.lng != null) {
          if (!dropMarker) {
            dropMarker = L.circleMarker([drop.lat, drop.lng], {
              radius: 8,
              color: '#D4956A',
              fillColor: '#D4956A',
              fillOpacity: 0.9,
            }).addTo(map).bindPopup('Drop');
          } else {
            dropMarker.setLatLng([drop.lat, drop.lng]);
          }
        }

        if (vehicle && vehicle.lat != null && vehicle.lng != null) {
          if (!vehicleMarker) {
            vehicleMarker = L.marker([vehicle.lat, vehicle.lng], {
              icon: vehicleIcon(),
              title: 'Cab',
            }).addTo(map).bindPopup('Live cab location');
          } else {
            vehicleMarker.setLatLng([vehicle.lat, vehicle.lng]);
          }
        }

        if (!fittedOnce) {
          const pts = [];
          if (pickup) pts.push([pickup.lat, pickup.lng]);
          if (drop) pts.push([drop.lat, drop.lng]);
          if (vehicle) pts.push([vehicle.lat, vehicle.lng]);
          if (pts.length >= 2) {
            map.fitBounds(pts, { padding: [40, 40] });
          } else if (pts.length === 1) {
            map.setView(pts[0], 15);
          }
          fittedOnce = true;
        } else if (vehicle) {
          map.panTo([vehicle.lat, vehicle.lng], { animate: true });
        }
      }

      async function tick() {
        try {
          const res = await fetch(apiUrl, { headers: { Accept: 'application/json' } });
          const json = await res.json();
          if (!res.ok || !json.success) {
            throw new Error((json && json.message) || 'Share link invalid or expired');
          }
          render(json.data);
        } catch (e) {
          statusPill.textContent = 'Unavailable';
          statusPill.className = 'status done';
          content.innerHTML = '<div class="error">' + esc(e.message || 'Unable to load trip') + '</div>';
        }
      }

      tick();
      setInterval(tick, 4000);
    })();
  </script>
</body>
</html>
