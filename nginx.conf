events {
    worker_connections 1024;
}

http {
    # Allow large file uploads (documents up to 10MB)
    client_max_body_size 15M;
    client_body_timeout 120s;
    client_header_timeout 120s;
    
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=2r/s;

    # Upstream services
    upstream gateway {
        server gateway:3000;
        keepalive 32;
    }

    upstream realtime {
        server realtime-service:5007;
    }

    # Monitoring upstreams (resolved at request time — won't crash if containers aren't running)
    resolver 127.0.0.11 valid=30s ipv6=off;  # Docker embedded DNS

    # HTTP server: serves traffic directly (add HTTPS later with certbot)
    server {
        listen 80;
        server_name api.raahionrescue.com;

        # For Let's Encrypt HTTP-01 challenge.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Health endpoint for Docker healthchecks.
        location /health {
            proxy_pass http://gateway/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Proxy all API traffic on HTTP (until SSL is configured)
        location / {
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ============================================
    # HTTPS server — UNCOMMENT after running certbot:
    #   sudo certbot certonly --webroot -w ./certbot/www -d api.raahionrescue.com
    #   mkdir -p ssl
    #   sudo cp /etc/letsencrypt/live/api.raahionrescue.com/fullchain.pem ./ssl/
    #   sudo cp /etc/letsencrypt/live/api.raahionrescue.com/privkey.pem ./ssl/
    #   docker compose -f docker-compose.prod.yml restart nginx
    # ============================================
    # server {
    #     listen 443 ssl http2;
    #     server_name api.raahionrescue.com;
    #     ssl_certificate /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ... (full HTTPS block preserved in git history)
    # }
}
