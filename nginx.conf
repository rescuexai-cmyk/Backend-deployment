events {
    worker_connections 1024;
}

http {
    # Allow large file uploads (documents up to 10MB)
    client_max_body_size 15M;
    client_body_timeout 120s;
    client_header_timeout 120s;
    
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=2r/s;

    # Upstream services
    upstream gateway {
        server gateway:3000;
        keepalive 32;
    }

    upstream realtime {
        server realtime-service:5007;
    }

    # Monitoring upstreams (resolved at request time — won't crash if containers aren't running)
    resolver 127.0.0.11 valid=30s ipv6=off;  # Docker embedded DNS

    # HTTP server: health + ACME + redirect to HTTPS
    server {
        listen 80;
        server_name api.raahionrescue.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location /health {
            proxy_pass http://gateway/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name api.raahionrescue.com;

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        add_header Strict-Transport-Security "max-age=31536000" always;

        # Health check
        location /health {
            proxy_pass http://gateway/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Document upload (extended timeouts)
        location /api/driver/onboarding/document/upload {
            limit_req zone=upload burst=5 nodelay;
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            proxy_request_buffering off;
            proxy_buffering off;
        }

        # API Gateway
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Auth (stricter rate limit)
        location /api/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Socket.io (WebSocket)
        location /socket.io/ {
            proxy_pass http://realtime;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;
        }

        # Monitoring (lazy-resolved — won't crash if containers aren't running)
        location /grafana/ {
            set $grafana_upstream http://grafana:3000;
            proxy_pass $grafana_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
        }

        location /prometheus/ {
            set $prometheus_upstream http://prometheus:9090;
            proxy_pass $prometheus_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /alertmanager/ {
            set $alertmanager_upstream http://alertmanager:9093;
            proxy_pass $alertmanager_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location / {
            return 200 'Raahi Backend API - Use /api/ endpoints';
            add_header Content-Type text/plain;
        }
    }
}
