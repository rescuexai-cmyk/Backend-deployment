# ============================================
# RAAHI - SMALL VPS / EC2 (1-2GB RAM)
# ============================================
# Core app ONLY - NO monitoring stack
# 12 containers instead of 21
# ============================================
# Usage: docker compose -f docker-compose.droplet.yml up -d
# For monitoring: use docker-compose.prod.yml on a bigger server
# ============================================

version: "3.9"

services:
  # ============================================
  # PostgreSQL is now on AWS RDS (external)
  # Set DATABASE_URL in .env to your RDS endpoint
  # ============================================


  redis:
    image: redis:7-alpine
    container_name: raahi-redis
    restart: always
    mem_limit: 64m
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    container_name: raahi-gateway
    restart: always
    mem_limit: 128m
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:5001
      USER_SERVICE_URL: http://user-service:5002
      DRIVER_SERVICE_URL: http://driver-service:5003
      RIDE_SERVICE_URL: http://ride-service:5004
      PRICING_SERVICE_URL: http://pricing-service:5005
      NOTIFICATION_SERVICE_URL: http://notification-service:5006
      REALTIME_SERVICE_URL: http://realtime-service:5007
      ADMIN_SERVICE_URL: http://admin-service:5008
    depends_on:
      auth-service: { condition: service_healthy }
      user-service: { condition: service_healthy }
      driver-service: { condition: service_healthy }
      ride-service: { condition: service_healthy }
      pricing-service: { condition: service_healthy }
      notification-service: { condition: service_healthy }
      realtime-service: { condition: service_healthy }
      admin-service: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 90s

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: raahi-auth-service
    restart: always
    mem_limit: 128m
    environment:
      NODE_ENV: production
      PORT: 5001
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      TRUECALLER_CLIENT_ID: ${TRUECALLER_CLIENT_ID}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      ALLOW_DEV_OTP: ${ALLOW_DEV_OTP:-false}
      # S3 access for profile photo uploads (presigned URLs)
      AWS_S3_REGION: ${AWS_S3_REGION:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_CLOUDFRONT_DOMAIN: ${AWS_CLOUDFRONT_DOMAIN:-}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5001/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: raahi-user-service
    restart: always
    mem_limit: 128m
    environment:
      NODE_ENV: production
      PORT: 5002
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5002/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  driver-service:
    build:
      context: .
      dockerfile: services/driver-service/Dockerfile
    container_name: raahi-driver-service
    restart: always
    mem_limit: 128m
    environment:
      NODE_ENV: production
      PORT: 5003
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      DIGILOCKER_CLIENT_ID: ${DIGILOCKER_CLIENT_ID}
      DIGILOCKER_CLIENT_SECRET: ${DIGILOCKER_CLIENT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      AWS_S3_REGION: ${AWS_S3_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_CLOUDFRONT_DOMAIN: ${AWS_CLOUDFRONT_DOMAIN}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      GOOGLE_VISION_API_KEY: ${GOOGLE_VISION_API_KEY}
      VISION_CONFIDENCE_THRESHOLD: ${VISION_CONFIDENCE_THRESHOLD:-0.70}
    depends_on:
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5003/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  ride-service:
    build:
      context: .
      dockerfile: services/ride-service/Dockerfile
    container_name: raahi-ride-service
    restart: always
    mem_limit: 128m
    environment:
      NODE_ENV: production
      PORT: 5004
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      PRICING_SERVICE_URL: http://pricing-service:5005
      REALTIME_SERVICE_URL: http://realtime-service:5007
      NOTIFICATION_SERVICE_URL: http://notification-service:5006
    depends_on:
      pricing-service: { condition: service_healthy }
      realtime-service: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5004/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  pricing-service:
    build:
      context: .
      dockerfile: services/pricing-service/Dockerfile
    container_name: raahi-pricing-service
    restart: always
    mem_limit: 64m
    environment:
      NODE_ENV: production
      PORT: 5005
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      BASE_FARE: ${BASE_FARE:-25}
      PER_KM_RATE: ${PER_KM_RATE:-12}
      PER_MINUTE_RATE: ${PER_MINUTE_RATE:-2}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5005/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: raahi-notification-service
    restart: always
    mem_limit: 64m
    environment:
      NODE_ENV: production
      PORT: 5006
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-raahi-5f22e}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5006/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  realtime-service:
    build:
      context: .
      dockerfile: services/realtime-service/Dockerfile
    container_name: raahi-realtime-service
    restart: always
    mem_limit: 64m
    ports:
      - "5007:5007"
    environment:
      NODE_ENV: production
      PORT: 5007
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      NOTIFICATION_SERVICE_URL: http://notification-service:5006
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5007/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  admin-service:
    build:
      context: .
      dockerfile: services/admin-service/Dockerfile
    container_name: raahi-admin-service
    restart: always
    mem_limit: 64m
    environment:
      NODE_ENV: production
      PORT: 5008
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5008/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  nginx:
    image: nginx:alpine
    container_name: raahi-nginx
    restart: always
    mem_limit: 32m
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - gateway
      - realtime-service
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  # pgdata: # Removed - using AWS RDS
  redisdata:
