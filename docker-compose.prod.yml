# ============================================
# RAAHI - PRODUCTION STACK (Crash-resistant)
# ============================================
# - All services: restart always (auto-recover on crash)
# - mem_limit on all: prevents OOM cascade (one service can't kill others)
# - Health checks: proper startup order
# - Monitoring: docker compose --profile monitoring up -d
# - Minimal (no monitoring): docker compose up -d
# - Recommended: 4GB+ RAM for full stack
# ============================================

version: "3.9"

services:
  # ============================================
  # PostgreSQL is now on AWS RDS (external)
  # Set DATABASE_URL in .env to your RDS endpoint
  # ============================================


  redis:
    image: redis:7-alpine
    container_name: raahi-redis
    restart: always
    mem_limit: 128m
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    container_name: raahi-gateway
    restart: always
    mem_limit: 256m
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:5001
      USER_SERVICE_URL: http://user-service:5002
      DRIVER_SERVICE_URL: http://driver-service:5003
      RIDE_SERVICE_URL: http://ride-service:5004
      PRICING_SERVICE_URL: http://pricing-service:5005
      NOTIFICATION_SERVICE_URL: http://notification-service:5006
      REALTIME_SERVICE_URL: http://realtime-service:5007
      ADMIN_SERVICE_URL: http://admin-service:5008
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      driver-service:
        condition: service_healthy
      ride-service:
        condition: service_healthy
      pricing-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      realtime-service:
        condition: service_healthy
      admin-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: raahi-auth-service
    restart: always
    mem_limit: 256m
    environment:
      NODE_ENV: production
      PORT: 5001
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      TRUECALLER_CLIENT_ID: ${TRUECALLER_CLIENT_ID}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      ALLOW_DEV_OTP: ${ALLOW_DEV_OTP:-false}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5001/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: raahi-user-service
    restart: always
    mem_limit: 256m
    environment:
      NODE_ENV: production
      PORT: 5002
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5002/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  driver-service:
    build:
      context: .
      dockerfile: services/driver-service/Dockerfile
    container_name: raahi-driver-service
    restart: always
    mem_limit: 256m
    environment:
      NODE_ENV: production
      PORT: 5003
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      DIGILOCKER_CLIENT_ID: ${DIGILOCKER_CLIENT_ID}
      DIGILOCKER_CLIENT_SECRET: ${DIGILOCKER_CLIENT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      AWS_S3_REGION: ${AWS_S3_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_CLOUDFRONT_DOMAIN: ${AWS_CLOUDFRONT_DOMAIN}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      GOOGLE_VISION_API_KEY: ${GOOGLE_VISION_API_KEY}
      VISION_CONFIDENCE_THRESHOLD: ${VISION_CONFIDENCE_THRESHOLD:-0.70}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5003/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  ride-service:
    build:
      context: .
      dockerfile: services/ride-service/Dockerfile
    container_name: raahi-ride-service
    restart: always
    mem_limit: 256m
    environment:
      NODE_ENV: production
      PORT: 5004
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      PRICING_SERVICE_URL: http://pricing-service:5005
      REALTIME_SERVICE_URL: http://realtime-service:5007
      NOTIFICATION_SERVICE_URL: http://notification-service:5006
    depends_on:
      pricing-service:
        condition: service_healthy
      realtime-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5004/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  pricing-service:
    build:
      context: .
      dockerfile: services/pricing-service/Dockerfile
    container_name: raahi-pricing-service
    restart: always
    mem_limit: 128m
    environment:
      NODE_ENV: production
      PORT: 5005
      DATABASE_URL: ${DATABASE_URL}
      BASE_FARE: ${BASE_FARE:-25}
      PER_KM_RATE: ${PER_KM_RATE:-12}
      PER_MINUTE_RATE: ${PER_MINUTE_RATE:-2}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5005/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: raahi-notification-service
    restart: always
    mem_limit: 128m
    environment:
      NODE_ENV: production
      PORT: 5006
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-raahi-5f22e}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5006/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  realtime-service:
    build:
      context: .
      dockerfile: services/realtime-service/Dockerfile
    container_name: raahi-realtime-service
    restart: always
    mem_limit: 128m
    ports:
      - "127.0.0.1:5007:5007"
    environment:
      NODE_ENV: production
      PORT: 5007
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      NOTIFICATION_SERVICE_URL: http://notification-service:5006
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5007/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  admin-service:
    build:
      context: .
      dockerfile: services/admin-service/Dockerfile
    container_name: raahi-admin-service
    restart: always
    mem_limit: 128m
    environment:
      NODE_ENV: production
      PORT: 5008
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5008/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  metrics-service:
    profiles:
      - monitoring
    build:
      context: .
      dockerfile: services/metrics-service/Dockerfile
    container_name: raahi-metrics-service
    restart: always
    ports:
      - "127.0.0.1:5010:5010"
    environment:
      NODE_ENV: production
      PORT: 5010
      DATABASE_URL: ${DATABASE_URL}
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:alpine
    container_name: raahi-nginx
    restart: always
    mem_limit: 64m
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - gateway
      - realtime-service
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================
  # MONITORING STACK (profile: monitoring)
  # Run with: docker compose --profile monitoring up -d
  # Skip on small instances: docker compose up -d (no --profile)
  # ============================================

  prometheus:
    profiles:
      - monitoring
    image: prom/prometheus:v2.48.0
    container_name: raahi-prometheus
    restart: always
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--storage.tsdb.retention.size=500MB'
      - '--web.enable-lifecycle'
      - '--query.max-concurrency=5'
    mem_limit: 256m
    memswap_limit: 256m
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    profiles:
      - monitoring
    image: grafana/grafana:10.2.0
    container_name: raahi-grafana
    restart: always
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-raahi_prod_2024_secure}
      GF_SECURITY_ADMIN_USER: raahi_admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-R44h1_Gr4f4n4_2024_S3cur3!}
      GF_SECURITY_SECRET_KEY: ${GRAFANA_SECRET_KEY:-SW2YcwTIb9zpOOhoPsMm}
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_ALLOW_ORG_CREATE: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_ALLOW_EMBEDDING: "false"
      GF_SNAPSHOTS_EXTERNAL_ENABLED: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
      GF_ALERTING_ENABLED: "false"
      GF_UNIFIED_ALERTING_ENABLED: "false"
      GF_LIVE_MAX_CONNECTIONS: "10"
      GF_LOG_MODE: "console"
      GF_LOG_LEVEL: "warn"
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    mem_limit: 256m
    memswap_limit: 256m
    depends_on:
      prometheus:
        condition: service_started
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  node-exporter:
    profiles:
      - monitoring
    image: prom/node-exporter:v1.7.0
    container_name: raahi-node-exporter
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    mem_limit: 64m

  postgres-exporter:
    profiles:
      - monitoring
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: raahi-postgres-exporter
    restart: always
    environment:
      DATA_SOURCE_NAME: ${DATABASE_URL}?sslmode=require
    mem_limit: 64m
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9187/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  redis-exporter:
    profiles:
      - monitoring
    image: oliver006/redis_exporter:v1.55.0
    container_name: raahi-redis-exporter
    restart: always
    environment:
      REDIS_ADDR: redis://redis:6379
    mem_limit: 32m
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9121/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  alertmanager:
    profiles:
      - monitoring
    image: prom/alertmanager:v0.26.0
    container_name: raahi-alertmanager
    restart: always
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    mem_limit: 64m
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  # pgdata: # Removed - using AWS RDS
  redisdata:
  prometheus_data:
  grafana_data:
  alertmanager_data:
