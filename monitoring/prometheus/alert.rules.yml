groups:
  - name: service_alerts
    rules:
      # Service down alert
      - alert: ServiceDown
        expr: probe_success == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.instance }} is down"
          description: "{{ $labels.instance }} has been unreachable for more than 1 minute."

      # High error rate (5xx responses)
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(nginx_http_requests_total{status=~"5.."}[5m])) 
            / 
            sum(rate(nginx_http_requests_total[5m]))
          ) * 100 > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP error rate detected"
          description: "Error rate is above 5% (current: {{ $value | printf \"%.2f\" }}%)"

  - name: infrastructure_alerts
    rules:
      # High CPU usage
      - alert: HighCPUUsage
        expr: 100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is above 80% (current: {{ $value | printf \"%.2f\" }}%)"

      # High memory usage
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is above 85% (current: {{ $value | printf \"%.2f\" }}%)"

      # Disk space low
      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) * 100 < 15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space on {{ $labels.mountpoint }}"
          description: "Disk space is below 15% (current: {{ $value | printf \"%.2f\" }}%)"

      # Disk space critical
      - alert: DiskSpaceCritical
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) * 100 < 5
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Critical disk space on {{ $labels.mountpoint }}"
          description: "Disk space is below 5% (current: {{ $value | printf \"%.2f\" }}%)"

  - name: database_alerts
    rules:
      # Database connections near limit
      - alert: PostgreSQLConnectionsHigh
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connections high"
          description: "PostgreSQL has {{ $value }} active connections (approaching limit)"

      # Database down
      - alert: PostgreSQLDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL database is not responding"

      # Slow queries
      - alert: PostgreSQLSlowQueries
        expr: rate(pg_stat_activity_max_tx_duration{datname!~"template.*"}[5m]) > 60
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL slow queries detected"
          description: "Long-running transactions detected in {{ $labels.datname }}"

  - name: redis_alerts
    rules:
      # Redis down
      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis instance is not responding"

      # Redis memory high
      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage high"
          description: "Redis memory usage is above 80%"

  - name: container_alerts
    rules:
      # Container restart
      - alert: ContainerRestarting
        expr: rate(container_last_seen{name=~"raahi.*"}[5m]) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} is restarting frequently"
          description: "Container {{ $labels.name }} has restarted more than twice in the last 5 minutes"

      # Container high CPU
      - alert: ContainerHighCPU
        expr: rate(container_cpu_usage_seconds_total{name=~"raahi.*"}[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} high CPU"
          description: "Container {{ $labels.name }} CPU usage is above 80%"

  # ============================================
  # BUSINESS KPI ALERTS - DRIVERS
  # ============================================

  - name: driver_kpi_alerts
    rules:
      # Driver retention rate below threshold
      - alert: DriverRetentionLow
        expr: raahi_driver_retention_30d < 70
        for: 1h
        labels:
          severity: warning
          domain: drivers
        annotations:
          summary: "Driver retention rate is low"
          description: "30-day driver retention is {{ $value | printf \"%.1f\" }}% (threshold: 70%)"

      # Average driver rating below threshold
      - alert: DriverRatingLow
        expr: raahi_driver_avg_rating < 4.0
        for: 30m
        labels:
          severity: warning
          domain: drivers
        annotations:
          summary: "Average driver rating is below threshold"
          description: "Average driver rating is {{ $value | printf \"%.2f\" }} (threshold: 4.0)"

      # Active drivers significant drop (>20% vs previous value)
      - alert: ActiveDriversDrop
        expr: |
          (
            raahi_driver_active - raahi_driver_active offset 1h
          ) / raahi_driver_active offset 1h * -100 > 20
        for: 15m
        labels:
          severity: critical
          domain: drivers
        annotations:
          summary: "Significant drop in active drivers"
          description: "Active drivers dropped by more than 20% in the last hour"

      # Very few online drivers
      - alert: OnlineDriversLow
        expr: raahi_driver_online < 5
        for: 10m
        labels:
          severity: critical
          domain: drivers
        annotations:
          summary: "Very few drivers online"
          description: "Only {{ $value }} drivers are currently online"

      # Driver verification backlog
      - alert: DriverVerificationBacklog
        expr: raahi_driver_documents_status{status="pending"} > 50
        for: 30m
        labels:
          severity: warning
          domain: drivers
        annotations:
          summary: "High number of pending document verifications"
          description: "{{ $value }} documents are pending verification"

      # Driver onboarding stuck
      - alert: DriverOnboardingStuck
        expr: raahi_driver_onboarding_status{status="in_progress"} > 20
        for: 1h
        labels:
          severity: warning
          domain: drivers
        annotations:
          summary: "Many drivers stuck in onboarding"
          description: "{{ $value }} drivers are stuck in onboarding process"

      # Low driver utilization
      - alert: DriverUtilizationLow
        expr: raahi_driver_utilization_rate < 10
        for: 30m
        labels:
          severity: warning
          domain: drivers
        annotations:
          summary: "Low driver utilization rate"
          description: "Only {{ $value | printf \"%.1f\" }}% of active drivers are online"

      # High churn rate
      - alert: DriverChurnHigh
        expr: raahi_driver_churned_30d > raahi_driver_new_30d
        for: 1d
        labels:
          severity: warning
          domain: drivers
        annotations:
          summary: "Driver churn exceeds new signups"
          description: "{{ $value }} drivers churned vs new signups in last 30 days"

  # Recording rules for complex calculations
  - name: driver_recording_rules
    interval: 60s
    rules:
      # 30-day average of active drivers (for comparison)
      - record: raahi_driver_active:avg_30d
        expr: avg_over_time(raahi_driver_active[30d])

      # Week-over-week growth rate
      - record: raahi_driver_active:wow_growth
        expr: |
          (raahi_driver_active - raahi_driver_active offset 7d) 
          / raahi_driver_active offset 7d * 100

      # Driver efficiency score (composite metric)
      - record: raahi_driver_efficiency_score
        expr: |
          (raahi_driver_avg_rating / 5 * 40) +
          (raahi_driver_retention_30d / 100 * 30) +
          (raahi_driver_verification_rate / 100 * 30)
